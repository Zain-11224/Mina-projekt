<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Animationer</title>
  <link rel="stylesheet" href="Styel.css">
</head>
<body>

  <h1>CSS-animationer</h1>

  <h2>Transition</h2>
  <p>
    En transition gör så att en förändring sker mjukt,
    till exempel när man håller musen över ett objekt.
  </p>

  <div class="box transition-box">Hovra mig</div>

  <h2>Animation (@keyframes)</h2>
  <p>
    Animation används när man vill skapa rörelse som
    upprepas automatiskt.
  </p>

  <div class="box animation-box"></div>

</body>
</html>
